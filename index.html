<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catering Booking</title>

<style>

/* RESET */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: 'Segoe UI', Arial;
}

/* HERO FULL SCREEN */
.hero{
  height:100vh;
  min-height:100dvh;
  width:100%;
  position:relative;
  overflow:hidden;
}

/* SLIDES */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:1s;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:zoom 6s infinite alternate;
}

/* TEXT LEFT */
.text-slide{
  position:absolute;
  left:4%;
  top:50%;
  transform:translateY(-50%);
  color:white;
  max-width:320px;
  opacity:0;
  transition:1s;
  z-index:2;
  background:rgba(0,0,0,0.45);
  padding:15px;
  border-radius:8px;
}

.text-slide h1{
  font-size:32px;
  margin-bottom:8px;
}

.text-slide p{
  font-size:15px;
}

/* OVERLAY */
.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
  z-index:1;
}

/* RIGHT FORM */
.container{
  position:absolute;
  right:5%;
  top:50%;
  transform:translateY(-50%);
  z-index:3;
}

/* FORM CARD */
.card{
  width:270px;
  background:rgba(11,60,93,0.95);
  backdrop-filter: blur(6px);
  padding:15px;
  border-radius:10px;
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* INPUT */
.row{
  display:flex;
  gap:8px;
}

input, select{
  width:100%;
  padding:8px;
  margin-bottom:8px;
  border-radius:5px;
  border:none;
  background:#f1f1f1;
}

/* ERROR */
.error{
  color:#ff6b6b;
  font-size:11px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  background:#ff9800;
  border:none;
  color:white;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#e68900;
}

/* ANIMATION */
@keyframes zoom{
  0%{transform:scale(1);}
  100%{transform:scale(1.1);}
}

/* MOBILE */
@media (max-width:768px){

  body{
    overflow:auto;
  }

  .container{
    position:relative;
    top:auto;
    right:auto;
    transform:none;
    width:100%;
    display:flex;
    justify-content:center;
    margin-top:20px;
  }

  .text-slide{
    left:10px;
    right:10px;
    top:30%;
    transform:none;
  }

}

</style>
</head>

<body>

<div class="hero">

<!-- IMAGE SLIDES -->
<div class="slide"><img src="https://images.unsplash.com/photo-1555244162-803834f70033"></div>
<div class="slide"><img src="https://images.unsplash.com/photo-1585937421612-70a008356fbe"></div>

<!-- TEXT SLIDES -->
<div class="text-slide">
<h1>Jain Catering</h1>
<p>2ख68,शंतिनगर हिरन मगरी- 5, उदयपुर</p>
</div>

<div class="text-slide">
<h1 style="color:#ff9800;">Best Quality Food</h1>
<p>हम स्वाद, क्वालिटी और सर्विस में नंबर 1 हैं।</p>
</div>

<div class="text-slide">
<h1>Book Now</h1>
<p>आज ही अपनी बुकिंग कन्फर्म करें।</p>
</div>

<!-- FORM -->
<div class="container">
<div class="card">

<div class="row">
<input id="name" placeholder="नाम">
<input id="mobile" placeholder="मोबाइल" maxlength="10" oninput="validateMobile()">
</div>
<small id="mobileError" class="error"></small>

<div class="row">
<input id="date" type="date">
<select id="event">
<option value="">कार्यक्रम</option>
<option>शादी</option>
<option>सगाई</option>
<option>जन्मदिन</option>
<option>मुंडन</option>
<option>रिटायरमेंट</option>
<option>शोक मिलन</option>
</select>
</div>

<div class="row">
<input id="people" type="number" placeholder="लोग">
<input id="address" placeholder="पता">
</div>

<button onclick="sendBooking()">Book Now</button>

</div>
</div>

</div>

<script>

/* SLIDER */
let slides=document.querySelectorAll(".slide");
let texts=document.querySelectorAll(".text-slide");
let i=0;

function show(){
  slides.forEach(s=>s.style.opacity=0);
  texts.forEach(t=>t.style.opacity=0);

  slides[i].style.opacity=1;
  texts[i].style.opacity=1;
}

setInterval(()=>{
  i=(i+1)%slides.length;
  show();
},3000);

show();

/* MOBILE VALIDATION */
function validateMobile(){
  let input=document.getElementById("mobile");
  input.value=input.value.replace(/[^0-9]/g,'');
}

/* SEND ENQUIRY */
function sendBooking(){

  let name=document.getElementById("name").value;
  let mobile=document.getElementById("mobile").value;
  let date=document.getElementById("date").value;
  let event=document.getElementById("event").value;
  let people=document.getElementById("people").value;
  let address=document.getElementById("address").value;

  if(!/^[0-9]{10}$/.test(mobile)){
    document.getElementById("mobileError").innerText="सही 10 digit नंबर डालें";
    return;
  }

  if(!name || !event || !date || !people || !address){
    alert("कृपया सभी जानकारी भरें");
    return;
  }

  let msg=`नई बुकिंग
नाम: ${name}
मोबाइल: ${mobile}
कार्यक्रम: ${event}
तारीख: ${date}
लोग: ${people}
पता: ${address}`;

  window.open("https://wa.me/919785229081?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
